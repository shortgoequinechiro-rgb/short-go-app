<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 460" width="700" height="460" font-family="'Helvetica Neue', Helvetica, Arial, sans-serif">
  <defs>
    <!-- Gold gradient for V on dark badge -->
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f0c84a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8861a;stop-opacity:1" />
    </linearGradient>
    <!-- White-to-gold gradient for V on light badge -->
    <linearGradient id="navyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9a227;stop-opacity:1" />
    </linearGradient>
    <!-- Dark panel drop shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <filter id="shadow2" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#0f2040" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- ── BACKGROUND ── -->
  <!-- Light half -->
  <rect x="0" y="0" width="700" height="230" fill="#f8f9fb"/>
  <!-- Dark half -->
  <rect x="0" y="230" width="700" height="230" fill="#0a1628"/>

  <!-- Subtle divider -->
  <line x1="0" y1="230" x2="700" y2="230" stroke="#dde3ee" stroke-width="1"/>

  <!-- ═══════════════════════════════════════════════════
       LIGHT VERSION  (top half)
  ════════════════════════════════════════════════════ -->

  <!-- Badge: navy rounded square -->
  <rect x="60" y="46" width="108" height="108" rx="24" ry="24" fill="#0f2040" filter="url(#shadow2)"/>

  <!-- V mark — white-to-gold gradient -->
  <!-- Left arm -->
  <polygon
    points="72,60  96,60  114,118  96,118"
    fill="url(#navyGrad)"
    opacity="0.97"
  />
  <!-- Right arm -->
  <polygon
    points="132,60  156,60  114,118  132,118"
    fill="url(#navyGrad)"
    opacity="0.97"
  />

  <!-- Vertebra tick marks on left arm (3 notches) -->
  <line x1="80"  y1="76"  x2="93"  y2="76"  stroke="rgba(255,255,255,0.28)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="85"  y1="91"  x2="100" y2="91"  stroke="rgba(255,255,255,0.28)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="90"  y1="106" x2="107" y2="106" stroke="rgba(255,255,255,0.28)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Vertebra tick marks on right arm (3 notches) -->
  <line x1="148" y1="76"  x2="135" y2="76"  stroke="rgba(255,255,255,0.28)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="143" y1="91"  x2="128" y2="91"  stroke="rgba(255,255,255,0.28)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="138" y1="106" x2="121" y2="106" stroke="rgba(255,255,255,0.28)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Wordmark: VERTA -->
  <text x="194" y="109" font-size="52" font-weight="900" letter-spacing="6" fill="#0f2040">VERTA</text>

  <!-- Tagline -->
  <text x="196" y="133" font-size="13" font-weight="500" letter-spacing="4.5" fill="#c9a227">PRACTICE MANAGEMENT</text>

  <!-- Label -->
  <text x="60" y="185" font-size="11" fill="#9aa5bc" letter-spacing="2" font-weight="500">LIGHT / PRIMARY VERSION</text>


  <!-- ═══════════════════════════════════════════════════
       DARK VERSION  (bottom half)
  ════════════════════════════════════════════════════ -->

  <!-- Badge: gold rounded square -->
  <rect x="60" y="276" width="108" height="108" rx="24" ry="24" fill="#c9a227" filter="url(#shadow)"/>

  <!-- V mark — navy -->
  <!-- Left arm -->
  <polygon
    points="72,290  96,290  114,348  96,348"
    fill="#0f2040"
    opacity="0.95"
  />
  <!-- Right arm -->
  <polygon
    points="132,290  156,290  114,348  132,348"
    fill="#0f2040"
    opacity="0.95"
  />

  <!-- Vertebra tick marks on left arm -->
  <line x1="80"  y1="306" x2="93"  y2="306" stroke="rgba(15,32,64,0.30)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="85"  y1="321" x2="100" y2="321" stroke="rgba(15,32,64,0.30)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="90"  y1="336" x2="107" y2="336" stroke="rgba(15,32,64,0.30)" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Vertebra tick marks on right arm -->
  <line x1="148" y1="306" x2="135" y2="306" stroke="rgba(15,32,64,0.30)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="143" y1="321" x2="128" y2="321" stroke="rgba(15,32,64,0.30)" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="138" y1="336" x2="121" y2="336" stroke="rgba(15,32,64,0.30)" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Wordmark: VERTA (white) -->
  <text x="194" y="339" font-size="52" font-weight="900" letter-spacing="6" fill="#ffffff">VERTA</text>

  <!-- Tagline (gold) -->
  <text x="196" y="363" font-size="13" font-weight="500" letter-spacing="4.5" fill="#c9a227">PRACTICE MANAGEMENT</text>

  <!-- Label -->
  <text x="60" y="415" font-size="11" fill="#4a6080" letter-spacing="2" font-weight="500">DARK / REVERSED VERSION</text>

  <!-- ── COLOR SWATCHES ── bottom right corner -->
  <g transform="translate(500, 290)">
    <rect x="0"   y="0" width="32" height="32" rx="6" fill="#0f2040"/>
    <rect x="40"  y="0" width="32" height="32" rx="6" fill="#c9a227"/>
    <rect x="80"  y="0" width="32" height="32" rx="6" fill="#162d55"/>
    <rect x="120" y="0" width="32" height="32" rx="6" fill="#f0c84a"/>

    <text x="0"   y="48" font-size="9" fill="#4a6080" letter-spacing="0.5">#0f2040</text>
    <text x="40"  y="48" font-size="9" fill="#4a6080" letter-spacing="0.5">#c9a227</text>
    <text x="80"  y="48" font-size="9" fill="#4a6080" letter-spacing="0.5">#162d55</text>
    <text x="120" y="48" font-size="9" fill="#4a6080" letter-spacing="0.5">#f0c84a</text>

    <text x="0" y="-12" font-size="10" fill="#9aa5bc" letter-spacing="1.5" font-weight="500">BRAND COLORS</text>
  </g>

  <!-- Icon-only preview (small, top-right) -->
  <g transform="translate(570, 56)">
    <rect x="0" y="0" width="52" height="52" rx="12" fill="#0f2040"/>
    <polygon points="6,8  18,8  26,46  18,46" fill="url(#navyGrad)" opacity="0.97"/>
    <polygon points="46,8  34,8  26,46  34,46" fill="url(#navyGrad)" opacity="0.97"/>
    <text x="8" y="72" font-size="9" fill="#9aa5bc" letter-spacing="1">ICON ONLY</text>
  </g>

  <!-- Wordmark-only preview -->
  <g transform="translate(490, 130)">
    <text x="0" y="0" font-size="28" font-weight="900" letter-spacing="4" fill="#0f2040">VERTA</text>
    <text x="2" y="16" font-size="8" font-weight="500" letter-spacing="3.5" fill="#c9a227">PRACTICE MANAGEMENT</text>
    <text x="0" y="34" font-size="9" fill="#9aa5bc" letter-spacing="1">WORDMARK ONLY</text>
  </g>

</svg>
