<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jump Color Change</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
    font-family: 'Segoe UI', sans-serif;
    overflow: hidden;
  }
  canvas { display: block; border-radius: 12px; }
  .controls {
    margin-top: 20px;
    display: flex;
    gap: 16px;
    align-items: center;
  }
  .btn {
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    padding: 14px 36px;
    border-radius: 50px;
    font-size: 18px;
    font-weight: 600;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 15px rgba(102,126,234,0.4);
  }
  .btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(102,126,234,0.6); }
  .btn:active { transform: translateY(0); }
  .hint {
    color: rgba(255,255,255,0.5);
    font-size: 14px;
    margin-top: 10px;
    letter-spacing: 0.3px;
  }
</style>
</head>
<body>

<canvas id="scene" width="900" height="560"></canvas>
<div class="controls">
  <button class="btn" id="jumpBtn">JUMP</button>
</div>
<div class="hint">Click JUMP or press SPACEBAR</div>

<script>
const canvas = document.getElementById('scene');
const ctx = canvas.getContext('2d');

// Color palettes
const shirtColors = [
  '#e74c3c', '#3498db', '#2ecc71', '#f39c12', '#9b59b6',
  '#1abc9c', '#e91e63', '#00bcd4', '#ff5722', '#8bc34a'
];
const carColors = [
  '#c0392b', '#2980b9', '#27ae60', '#d35400', '#8e44ad',
  '#16a085', '#c2185b', '#0097a7', '#e64a19', '#689f38'
];

let shirtColorIdx = 0;
let carColorIdx = 5;
let targetShirtIdx = 0;
let targetCarIdx = 5;

// Jump physics
let jumping = false;
let jumpT = 0;
const jumpDuration = 50; // frames
const jumpHeight = 180;
let colorChanged = false;

// Particles
let particles = [];

// Color flash
let flashAlpha = 0;
let flashColor = '#fff';

function getJumpY(t) {
  // Parabolic arc: 0 at start/end, jumpHeight at peak
  const norm = t / jumpDuration;
  return -4 * jumpHeight * norm * (norm - 1);
}

function startJump() {
  if (jumping) return;
  jumping = true;
  jumpT = 0;
  colorChanged = false;
  // Pick new colors (different from current)
  do { targetShirtIdx = Math.floor(Math.random() * shirtColors.length); }
  while (targetShirtIdx === shirtColorIdx);
  do { targetCarIdx = Math.floor(Math.random() * carColors.length); }
  while (targetCarIdx === carColorIdx);
}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    particles.push({
      x, y,
      vx: (Math.random() - 0.5) * 8,
      vy: (Math.random() - 0.5) * 8 - 3,
      r: Math.random() * 5 + 2,
      color,
      life: 1,
      decay: Math.random() * 0.03 + 0.015
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.15;
    p.life -= p.decay;
    if (p.life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  for (const p of particles) {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// Draw ground / environment
function drawBackground() {
  // Sky gradient
  const skyGrad = ctx.createLinearGradient(0, 0, 0, canvas.height);
  skyGrad.addColorStop(0, '#0f0c29');
  skyGrad.addColorStop(0.5, '#302b63');
  skyGrad.addColorStop(1, '#24243e');
  ctx.fillStyle = skyGrad;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Stars
  ctx.fillStyle = 'rgba(255,255,255,0.6)';
  const seed = [23,67,120,200,310,450,520,670,780,850,45,150,380,600,720,100,250,500,700,830];
  for (let i = 0; i < seed.length; i++) {
    const sx = seed[i];
    const sy = (seed[(i+7) % seed.length] * 0.35) % 200 + 20;
    ctx.beginPath();
    ctx.arc(sx, sy, 1.2, 0, Math.PI * 2);
    ctx.fill();
  }

  // Ground
  ctx.fillStyle = '#2d2d44';
  ctx.fillRect(0, 430, canvas.width, 130);

  // Road
  ctx.fillStyle = '#3a3a55';
  ctx.fillRect(0, 430, canvas.width, 60);

  // Road line
  ctx.setLineDash([30, 20]);
  ctx.strokeStyle = 'rgba(255,255,200,0.3)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, 460);
  ctx.lineTo(canvas.width, 460);
  ctx.stroke();
  ctx.setLineDash([]);

  // Sidewalk
  ctx.fillStyle = '#4a4a66';
  ctx.fillRect(0, 488, canvas.width, 8);
}

// Draw car (Tesla-like sedan)
function drawCar(x, y, color) {
  ctx.save();
  ctx.translate(x, y);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.3)';
  ctx.beginPath();
  ctx.ellipse(0, 32, 90, 10, 0, 0, Math.PI * 2);
  ctx.fill();

  // Body lower
  ctx.fillStyle = color;
  roundRect(-85, -8, 170, 35, 8);

  // Body upper (cabin)
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(-50, -8);
  ctx.quadraticCurveTo(-45, -45, -20, -48);
  ctx.lineTo(35, -48);
  ctx.quadraticCurveTo(60, -45, 65, -8);
  ctx.closePath();
  ctx.fill();

  // Windows
  ctx.fillStyle = 'rgba(100,150,255,0.3)';
  ctx.beginPath();
  ctx.moveTo(-43, -10);
  ctx.quadraticCurveTo(-38, -40, -17, -43);
  ctx.lineTo(-3, -43);
  ctx.lineTo(-3, -10);
  ctx.closePath();
  ctx.fill();

  ctx.beginPath();
  ctx.moveTo(3, -10);
  ctx.lineTo(3, -43);
  ctx.lineTo(32, -43);
  ctx.quadraticCurveTo(53, -40, 58, -10);
  ctx.closePath();
  ctx.fill();

  // Headlights
  ctx.fillStyle = 'rgba(255,240,200,0.9)';
  ctx.beginPath();
  ctx.ellipse(82, 4, 6, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Taillights
  ctx.fillStyle = 'rgba(255,50,50,0.8)';
  ctx.beginPath();
  ctx.ellipse(-82, 4, 5, 3, 0, 0, Math.PI * 2);
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#1a1a1a';
  ctx.beginPath();
  ctx.arc(-50, 27, 14, 0, Math.PI * 2);
  ctx.fill();
  ctx.arc(50, 27, 14, 0, Math.PI * 2);
  ctx.fill();

  // Hubcaps
  ctx.fillStyle = '#444';
  ctx.beginPath();
  ctx.arc(-50, 27, 8, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(50, 27, 8, 0, Math.PI * 2);
  ctx.fill();

  // Rim detail
  ctx.strokeStyle = '#666';
  ctx.lineWidth = 1;
  for (let w of [-50, 50]) {
    for (let a = 0; a < 5; a++) {
      const angle = (a / 5) * Math.PI * 2;
      ctx.beginPath();
      ctx.moveTo(w, 27);
      ctx.lineTo(w + Math.cos(angle) * 7, 27 + Math.sin(angle) * 7);
      ctx.stroke();
    }
  }

  ctx.restore();
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

// Draw person
function drawPerson(x, y, shirtColor, jumpProgress) {
  ctx.save();
  ctx.translate(x, y);

  // Arm/leg animation based on jump
  const armAngle = jumpProgress > 0 ? Math.sin(jumpProgress * Math.PI) * 0.6 : 0;
  const legSpread = jumpProgress > 0 ? Math.sin(jumpProgress * Math.PI) * 0.3 : 0;

  // Shadow (only when near ground)
  const shadowScale = 1 - (jumpProgress > 0 ? Math.sin(jumpProgress * Math.PI) * 0.5 : 0);
  ctx.fillStyle = `rgba(0,0,0,${0.3 * shadowScale})`;
  ctx.beginPath();
  ctx.ellipse(0, 68 + getJumpY(jumpT > 0 ? jumpT : 0) + (jumpProgress > 0 ? getJumpY(jumpT) : 0), 18 * shadowScale, 5, 0, 0, Math.PI * 2);
  // Actually, let me redo shadow at ground level
  ctx.restore();
  ctx.save();
  ctx.translate(x, y + 68);
  const sScale = jumping ? (1 - Math.sin((jumpT / jumpDuration) * Math.PI) * 0.5) : 1;
  ctx.fillStyle = `rgba(0,0,0,${0.3 * sScale})`;
  ctx.beginPath();
  ctx.ellipse(0, 0, 18 * sScale, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  ctx.save();
  ctx.translate(x, y);

  // Legs
  ctx.strokeStyle = '#2c3e50';
  ctx.lineWidth = 7;
  ctx.lineCap = 'round';

  // Left leg
  ctx.beginPath();
  ctx.moveTo(-5, 28);
  ctx.lineTo(-10 - legSpread * 20, 65);
  ctx.stroke();

  // Right leg
  ctx.beginPath();
  ctx.moveTo(5, 28);
  ctx.lineTo(10 + legSpread * 20, 65);
  ctx.stroke();

  // Shoes
  ctx.fillStyle = '#1a1a2e';
  ctx.beginPath();
  ctx.ellipse(-10 - legSpread * 20, 67, 7, 4, -0.2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(10 + legSpread * 20, 67, 7, 4, 0.2, 0, Math.PI * 2);
  ctx.fill();

  // Body / Shirt
  ctx.fillStyle = shirtColor;
  ctx.beginPath();
  ctx.moveTo(-14, -8);
  ctx.lineTo(14, -8);
  ctx.lineTo(12, 30);
  ctx.lineTo(-12, 30);
  ctx.closePath();
  ctx.fill();

  // Shirt collar detail
  ctx.fillStyle = shiftColor(shirtColor, -20);
  ctx.beginPath();
  ctx.moveTo(-6, -8);
  ctx.lineTo(6, -8);
  ctx.lineTo(4, -3);
  ctx.lineTo(-4, -3);
  ctx.closePath();
  ctx.fill();

  // Arms
  ctx.strokeStyle = shirtColor;
  ctx.lineWidth = 7;

  // Left arm
  ctx.beginPath();
  ctx.moveTo(-13, -2);
  ctx.lineTo(-22 - armAngle * 15, 15 - armAngle * 25);
  ctx.stroke();

  // Right arm
  ctx.beginPath();
  ctx.moveTo(13, -2);
  ctx.lineTo(22 + armAngle * 15, 15 - armAngle * 25);
  ctx.stroke();

  // Hands
  ctx.fillStyle = '#f0c8a0';
  ctx.beginPath();
  ctx.arc(-22 - armAngle * 15, 15 - armAngle * 25, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(22 + armAngle * 15, 15 - armAngle * 25, 4, 0, Math.PI * 2);
  ctx.fill();

  // Head
  ctx.fillStyle = '#f0c8a0';
  ctx.beginPath();
  ctx.arc(0, -22, 15, 0, Math.PI * 2);
  ctx.fill();

  // Hair
  ctx.fillStyle = '#2c2c2c';
  ctx.beginPath();
  ctx.arc(0, -27, 14, Math.PI, 2 * Math.PI);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(0, -35, 10, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eyes
  ctx.fillStyle = '#2c2c2c';
  ctx.beginPath();
  ctx.arc(-5, -23, 2, 0, Math.PI * 2);
  ctx.fill();
  ctx.beginPath();
  ctx.arc(5, -23, 2, 0, Math.PI * 2);
  ctx.fill();

  // Smile
  ctx.strokeStyle = '#c0816a';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(0, -18, 5, 0.1, Math.PI - 0.1);
  ctx.stroke();

  ctx.restore();
}

function shiftColor(hex, amount) {
  let r = parseInt(hex.slice(1,3), 16);
  let g = parseInt(hex.slice(3,5), 16);
  let b = parseInt(hex.slice(5,7), 16);
  r = Math.max(0, Math.min(255, r + amount));
  g = Math.max(0, Math.min(255, g + amount));
  b = Math.max(0, Math.min(255, b + amount));
  return `rgb(${r},${g},${b})`;
}

// Main positions
const personX = 340;
const personGroundY = 360;
const carX = 600;
const carY = 420;

function animate() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  drawBackground();

  let personY = personGroundY;
  let jumpProgress = 0;

  if (jumping) {
    jumpT++;
    const offsetY = getJumpY(jumpT);
    personY = personGroundY - offsetY;
    jumpProgress = jumpT / jumpDuration;

    // At the peak, change colors
    if (jumpT >= jumpDuration / 2 && !colorChanged) {
      colorChanged = true;
      shirtColorIdx = targetShirtIdx;
      carColorIdx = targetCarIdx;

      // Spawn particles at person
      spawnParticles(personX, personY, shirtColors[shirtColorIdx], 30);
      // Spawn particles at car
      spawnParticles(carX, carY - 10, carColors[carColorIdx], 40);

      flashAlpha = 0.4;
      flashColor = shirtColors[shirtColorIdx];
    }

    if (jumpT >= jumpDuration) {
      jumping = false;
      jumpT = 0;
      // Landing particles
      spawnParticles(personX, personGroundY + 60, 'rgba(200,200,255,0.5)', 12);
    }
  }

  // Draw car
  drawCar(carX, carY, carColors[carColorIdx]);

  // Draw person
  drawPerson(personX, personY, shirtColors[shirtColorIdx], jumping ? jumpT / jumpDuration : 0);

  // Particles
  updateParticles();
  drawParticles();

  // Flash overlay
  if (flashAlpha > 0) {
    ctx.fillStyle = flashColor;
    ctx.globalAlpha = flashAlpha;
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.globalAlpha = 1;
    flashAlpha -= 0.02;
  }

  // Color labels
  ctx.font = '14px "Segoe UI", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.7)';
  ctx.textAlign = 'center';
  ctx.fillText(`Shirt: ${shirtColors[shirtColorIdx]}`, personX, 530);
  ctx.fillText(`Car: ${carColors[carColorIdx]}`, carX, 530);

  // Title
  ctx.font = 'bold 22px "Segoe UI", sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  ctx.textAlign = 'center';
  ctx.fillText('JUMP COLOR SWITCH', canvas.width / 2, 40);

  requestAnimationFrame(animate);
}

// Controls
document.getElementById('jumpBtn').addEventListener('click', startJump);
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') {
    e.preventDefault();
    startJump();
  }
});

animate();
</script>
</body>
</html>
